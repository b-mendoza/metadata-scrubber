# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3.51.1"

vars:
  BINARY: metadata-scrubber

tasks:
  build:
    desc: Compile the project into a binary
    cmds:
      - go build -o {{.BINARY}} .

  run:
    desc: Run the project
    cmds:
      - go run .

  test:
    desc: Run the test suite with the race detector and coverage
    cmds:
      - go test -race -cover ./...

  lint:
    desc: Lint the source code with golangci-lint (pinned via the go.mod tool directive)
    cmds:
      - go tool golangci-lint run

  lint:fix:
    desc: Lint and auto-fix issues where supported
    cmds:
      - go tool golangci-lint run --fix

  vet:
    desc: Report suspicious constructs with go vet
    cmds:
      - go vet ./...

  fmt:
    desc: Format the source code
    cmds:
      - go fmt ./...

  tidy:
    desc: Add missing and remove unused module dependencies
    cmds:
      - go mod tidy
