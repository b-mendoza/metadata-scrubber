# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3.51.1"

vars:
  BINARY: metadata-scrubber
  GOLANGCI_LINT_CONFIG: .golangci.yml
  GOLANGCI_LINT_MODFILE: tools/go.mod
  GOLANGCI_LINT_MODULE: github.com/golangci/golangci-lint/v2/cmd/golangci-lint
  GOLANGCI_LINT: go run -modfile={{.GOLANGCI_LINT_MODFILE}} {{.GOLANGCI_LINT_MODULE}}

tasks:
  build:
    desc: Compile the project into a binary
    cmds:
      - go build -o {{.BINARY}} .

  run:
    desc: Run the project
    cmds:
      - go run .

  test:
    desc: Run the test suite with the race detector and coverage
    cmds:
      - go test -race -cover ./...

  # Read-only umbrella (CI-safe, writes nothing): lint + verify formatting.
  # golangci-lint's `run` checks the enabled formatters too, so a single
  # command covers both — no parallel runner needed like the frontend.
  lint:
    desc: Lint and verify formatting without modifying files (read-only)
    cmds:
      - "{{.GOLANGCI_LINT}} run --config {{.GOLANGCI_LINT_CONFIG}}"

  # Write umbrella (destructive): apply lint auto-fixes, then format. Format
  # runs last so the result is always cleanly formatted.
  fix:
    desc: Apply lint auto-fixes and format the source code (writes files)
    cmds:
      - task: fix:lint
      - task: fix:fmt

  fix:lint:
    desc: Apply lint auto-fixes where supported
    cmds:
      - "{{.GOLANGCI_LINT}} run --config {{.GOLANGCI_LINT_CONFIG}} --fix"

  fix:fmt:
    desc: Format the source code with gofumpt + gci (orchestrated by golangci-lint)
    cmds:
      - "{{.GOLANGCI_LINT}} fmt --config {{.GOLANGCI_LINT_CONFIG}}"

  tidy:
    desc: Add missing and remove unused module dependencies
    cmds:
      - go mod tidy
      - go -C tools mod tidy
