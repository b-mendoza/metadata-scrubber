# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.jsonschema.json
version: "2"

linters:
  # Start from the default set (errcheck, govet, ineffassign, staticcheck,
  # unused) and add a curated handful of widely-used, low-noise linters.
  enable:
    - bodyclose # checks that HTTP response bodies are closed
    - errorlint # finds problems with Go 1.13+ error wrapping (errors.Is/As)
    - misspell # catches commonly misspelled English words in comments/strings
    - revive # fast, configurable replacement for the deprecated golint
    - unconvert # flags unnecessary type conversions

formatters:
  enable:
    - gofumpt # stricter superset of gofmt; owns all non-import formatting
    - gci # deterministic, opinionated import sorting (regroups from scratch)
  settings:
    gofumpt:
      # Tell gofumpt this module's path so it groups our own packages in a
      # separate import block, matching gci's localmodule section below.
      # Without this, gofumpt and gci disagree on local-import grouping.
      module-path: metadata-scrubber
    gci:
      sections:
        - standard # standard library
        - default # third-party packages
        - localmodule # this module's own packages (auto-detected from go.mod)
