services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    environment:
      DATABASE_URL: postgres://user:password@localhost:5432/database
    ports:
      - "3000:3000"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    environment:
      PORT: "8080"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "/app/metadata-scrubber", "healthcheck"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
