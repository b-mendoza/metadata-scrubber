services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    env_file: frontend/.env
    ports:
      - "3000:3000"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    env_file: backend/.env
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
