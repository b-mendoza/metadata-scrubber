name: Backend Quality Checks

on:
  pull_request:
    paths:
      - .github/actions/go-quality-checks/**
      - .github/workflows/backend-check.yaml
      - backend/**

  push:
    branches:
      - main
    paths:
      - .github/actions/go-quality-checks/**
      - .github/workflows/backend-check.yaml
      - backend/**

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Build, lint, vet and test the backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Build, lint, vet and test"
        uses: ./.github/actions/go-quality-checks
