name: "Setup Go and Task"

description: "Sets up the Go toolchain and the Task runner, restores the Go build/module cache, and downloads dependencies"

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        # go-version-file keeps the CI toolchain in lockstep with go.mod, and
        # cache-dependency-path caches the module + build cache keyed on go.sum.
        # That cache is what amortizes golangci-lint's from-source compile across
        # runs — without it every runner rebuilds ~300 linter modules from zero.
        go-version-file: ./backend/go.mod
        cache-dependency-path: ./backend/go.sum

    - name: Setup Task
      uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
      with:
        version: 3.x
        # Avoids GitHub API rate limits when resolving the Task release.
        repo-token: ${{ github.token }}

    - name: Show tool versions
      shell: bash
      run: |
        go version
        task --version

    - name: Download dependencies
      shell: bash
      working-directory: ./backend
      run: go mod download
