name: "Setup Node.js, pnpm and dependencies"

description: Setup Node.js environment, pnpm package manager, restore/save the pnpm store cache, and install project dependencies

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        run_install: false
        package_json_file: ./frontend/package.json

    - name: Set pnpm store path
      id: pnpm-store-path
      shell: bash
      run: |
        store_path="$(pnpm store path --silent)"
        mkdir -p "$store_path"
        echo "path=$store_path" >> "$GITHUB_OUTPUT"

    - name: Setup Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version-file: ./frontend/.nvmrc

    - name: Restore pnpm store cache
      id: cache-restore
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ steps.pnpm-store-path.outputs.path }}
        key: pnpm-store-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-${{ runner.arch }}-

    - name: Show tool versions
      shell: bash
      run: |
        node -v
        pnpm --version

    - name: Install dependencies
      shell: bash
      working-directory: ./frontend
      run: pnpm install --frozen-lockfile

    - name: Save pnpm store cache
      if: steps.cache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ steps.pnpm-store-path.outputs.path }}
        key: ${{ steps.cache-restore.outputs.cache-primary-key }}
