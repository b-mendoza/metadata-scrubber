name: "Go Quality Checks"

description: "Builds, lints (incl. go vet via golangci-lint), and tests the Go backend"

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        # go-version-file keeps the CI toolchain in lockstep with go.mod, and
        # cache-dependency-path caches the module + build cache keyed on go.sum.
        # That cache is what amortizes golangci-lint's from-source compile across
        # runs — without it every runner rebuilds ~300 linter modules from zero.
        go-version-file: backend/go.mod
        cache-dependency-path: backend/go.sum

    - name: Show tool versions
      shell: bash
      run: go version

    - name: Build
      shell: bash
      working-directory: backend
      run: go build ./...

    - name: Lint and verify formatting
      shell: bash
      working-directory: backend
      # `go tool` runs the version of golangci-lint pinned in go.mod — no global
      # binary is installed. This also runs go vet's analyzers via the govet linter.
      run: go tool golangci-lint run --config .golangci.yml

    - name: Test
      shell: bash
      working-directory: backend
      run: go test -race -count=1 -coverprofile=coverage.out ./...
